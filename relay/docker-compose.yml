services:
  relay:
    build: .
    ports:
      - "41722:41722"
    environment:
      - BUDDYDRIVE_TOKENS=swift-eagle,brave-moose,calm-river,bright-star,quiet-forest
      - BUDDYDRIVE_PORT=41722
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "41722"]
      interval: 30s
      timeout: 10s
      retries: 3
